<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Feed</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="bg-blue-600 text-white text-center p-4 text-xl font-bold">
📢 Job Feed
</div>

<div id="jobs" class="max-w-4xl mx-auto p-4"></div>

<script>

async function loadJobs(){
    let res = await fetch("http://localhost:8000/jobs");
    let jobs = await res.json();

    document.getElementById("jobs").innerHTML = jobs.reverse().map(job => `
        <div class="bg-white p-5 rounded-xl shadow mb-4">

            <h2 class="text-xl font-bold">
                ${job.title}
                ${job.urgent ? '<span class="text-red-500 text-sm">URGENT</span>' : ''}
            </h2>

            <p class="text-gray-600"><b>Post:</b> ${job.post}</p>

            <p class="text-gray-700 mt-2">
                ${job.description || "No description available"}
            </p>

            <p class="text-green-600 font-semibold mt-2">
                💰 ${job.salary} Month
            </p>

            <p class="text-sm text-gray-400 mt-2">🕒 ${job.time}</p>

            <a href="apply.html?jobId=${job.id}&title=${encodeURIComponent(job.title)}"
               class="inline-block mt-3 bg-blue-600 text-white px-4 py-2 rounded">
               Apply Now
            </a>

        </div>
    `).join("");
}

loadJobs();
setInterval(loadJobs, 5000);

</script>

</body>
</html>
